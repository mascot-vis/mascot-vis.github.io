<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mascot</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="lib/dagre.min.js"></script>
    <script src="lib/three.js"></script>
    <script src="lib/pixi.min.js"></script>
    <script src="dist/mascot-umd.js"></script>
    <script src="lib/codemirror.js"></script>
    <script src="lib/acorn.js"></script>
    <link rel="stylesheet" href="lib/codemirror.css" />
    <script src="lib/javascript.js"></script>
    <script src="lib/jquery-1.12.4.js"></script>
    <script src="lib/jquery-ui.js"></script>
    <link rel="stylesheet" href="lib/jquery-ui.css" />
    <script src="js/depGraphVis.js"></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.datatables.net/2.3.2/css/dataTables.dataTables.min.css"
    />
    <script
      type="text/javascript"
      charset="utf8"
      src="https://cdn.datatables.net/2.3.2/js/dataTables.min.js"
    ></script>

    <style>
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial;
      }
      body {
        height: 100vh;
        margin: 0;
        padding: 0;
        background: #f2f2f2;
        overflow: hidden;
      }
      #topTabs {
        position: relative;
        height: 42px;
        display: flex;
        justify-content: center;
        border-bottom: 1px solid #bbb;
        background: #e8e8e8;
      }
      #topActions {
        position: absolute;
        left: 12px;
        top: 7px;
      }
      #showGalleryBtn {
        border: 1px solid #9aa3ad;
        border-radius: 999px;
        background: linear-gradient(#ffffff, #edf1f5);
        color: #243447;
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.08);
      }
      #showGalleryBtn:hover {
        background: linear-gradient(#ffffff, #e3e9ef);
        border-color: #7d8792;
      }
      #showGalleryBtn:active {
        transform: translateY(1px);
      }
      #showGalleryBtn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
        background: linear-gradient(#f0f0f0, #e0e0e0);
        border-color: #ccc;
      }
      .modeTab {
        border: 1px solid transparent;
        border-right: 1px solid #bbb;
        background: #ddd;
        padding: 0 18px;
        font-size: 15px;
        cursor: pointer;
        font-weight: bold;
      }
      .modeTab:last-child {
        border-right: none;
      }
      .modeTab.active {
        background: #fff;
        border-color: #bbb;
        border-bottom-color: #fff;
        margin-bottom: -1px;
        position: relative;
        z-index: 1;
      }
      #demoSidebar {
        width: 213px;
        height: calc(100% - 43px);
        border-right: 1px solid #ccc;
        background: #f2f2f2;
        float: left;
      }
      #demoList {
        width: 182px;
        max-width: 182px;
        height: calc(100% - 48px);
        background: transparent;
        padding: 0 5px 0 25px;
        list-style: none;
        font-size: 12px;
        overflow-y: auto;
        margin: 0;
      }
      #demoSearchWrap {
        width: 182px;
        max-width: 182px;
        background: transparent;
        padding: 10px 5px 8px 25px;
        box-sizing: content-box;
      }
      #demoSearch {
        width: calc(100% - 20px);
        border: 1px solid #bbb;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 12px;
        outline: none;
      }
      #demoSearch:focus {
        border-color: #7d8792;
        box-shadow: 0 0 0 2px rgba(125, 135, 146, 0.15);
      }
      .category {
        margin: 15px 0 10px -7px;
        font-weight: bold;
      }
      .demos {
        margin-bottom: 10px;
        padding: 0 15px 0 5px;
        list-style: none;
      }
      .demos li {
        margin-bottom: 8px;
      }
      .demos li:hover {
        cursor: pointer;
        color: blue;
      }
      #canvasElement {
        width: 1600;
        height: 1000;
        margin: 0;
        padding: 0;
        position: absolute;
        top: 43px;
        left: 213px;
      }
      #svgElement {
        width: calc(100% - 213px);
        height: calc(100% - 43px);
        margin: 0;
        padding: 0;
        position: absolute;
        top: 43px;
        left: 213px;
        background: white;
        user-select: none;
      }
      #gallery,
      #depGraphVis {
        width: calc(100% - 213px);
        height: calc(100% - 43px);
        overflow-y: auto;
        background: #fff;
        position: absolute;
        top: 43px;
        right: 0;
        z-index: 1000;
      }
      .galleryItem {
        max-width: 220px;
        min-width: 220px;
        height: 170px;
        vertical-align: text-bottom;
        text-align: center;
        border: 2px solid #eee;
        display: inline-block;
        margin: 10px 15px;
      }
      .galleryItem:hover {
        box-shadow: 0 0 5px #888;
        cursor: pointer;
      }
      #console {
        width: calc(100% - 228px);
        position: absolute;
        left: 221px;
        height: 70%;
        resize: none;
        border: none;
        display: none;
        padding: 60px;
      }
      #btmPanel {
        width: calc(100% - 213px);
        height: 260px;
        position: absolute;
        bottom: 0;
        right: 0;
      }
      #ctrlPanel {
        width: 250px;
        height: calc(100% - 42px);
        position: absolute;
        right: 0;
        top: 42px;
        background-color: #cddde9;
        padding: 40px 20px;
        display: none;
        z-index: 900;
      }
      .ui-tabs {
        padding: 0;
      }
      .ui-tabs .ui-tabs-panel {
        padding: 0;
      }
      .ui-tabs .ui-tabs-nav li a {
        font-size: 8.5pt !important;
        padding: 0;
      }
      #codeTab,
      #dataTab,
      #jsonTab {
        width: 100%;
        height: calc(100% - 40px);
      }
      #codeControls {
        width: 520px;
        height: 30px;
        position: absolute;
        top: 0;
        right: 0;
        margin: 8px 10px 0 0;
        font-size: 8.5pt;
        vertical-align: top;
      }
      .CodeMirror {
        width: 100%;
        height: 100%;
        resize: none;
        border: none;
        padding: 0;
        font-family: Courier;
        font-size: 12.5px;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="topTabs">
      <button class="modeTab active" data-mode="static">Static Charts</button>
      <button class="modeTab" data-mode="interactive">Interactive Charts</button>
      <div id="topActions">
        <button id="showGalleryBtn" onclick="d3.select('#gallery').style('visibility', 'visible'); window.updateShowGalleryBtn();">
          Show Gallery
        </button>
      </div>
    </div>

    <div id="demoSidebar">
      <div id="demoSearchWrap">
        <input id="demoSearch" type="text" placeholder="Search ..." aria-label="Search chart type" />
      </div>

      <ul id="demoList">
      </ul>
    </div>

    <canvas id="canvasElement"></canvas>
    <svg id="svgElement" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="console"></div>
    <div id="ctrlPanel"></div>

    <div id="btmPanel">
      <ul>
        <li><a href="#codeTab">Code</a></li>
        <li><a id="dataTabLi" href="#dataTab">Data</a></li>
        <li><a id="jsonTabLi" href="#jsonTab">Data</a></li>
        <li><a href="#infoTab">About</a></li>
      </ul>
      <div id="codeTab">
        <textarea id="scriptEditor"></textarea>
      </div>
      <div id="dataTab" style="overflow-y: auto">
        <table
          id="dataTable"
          class="display"
          style="font-size: 0.75rem; width: 100%"
        ></table>
      </div>
      <div id="jsonTab" style="overflow-y: auto"></div>
      <div id="infoTab" style="padding: 15px"></div>
      <div id="codeControls">
        <button onclick="window.loadScript()">run</button>
        <button id="benchmarkBtn" onclick="window.benchmark()" style="display: none">
          benchmark
        </button>
        <button onclick="window.save()">save</button>
        <button onclick="window.showDepGraph()">show graph</button>
        <span style="margin-left: 10px;">Renderer:</span>
        <input type="radio" id="SVG" name="renderer" value="svg" checked />
        <label for="SVG">SVG</label>
        <input type="radio" id="WebGL" name="renderer" value="webgl" disabled />
        <label for="WebGL">WebGL</label>
      </div>
    </div>

    <div id="gallery"></div>
    <svg id="depGraphVis"></svg>
    <a id="download"></a>

    <script type="module">
      import { JSONEditor } from "./lib/jsoneditor.js";

      let currentMode = "static";
      let staticMetaData = {};
      let interactiveMetaData = {};
      let allStaticKeys = new Set();
      let allInteractiveKeys = new Set();
      let dataTable = null;

      const editor = CodeMirror.fromTextArea(document.getElementById("scriptEditor"), {
        lineNumbers: true,
      });

      let jsonEditor;

      function showError(message, source, lineno, colno, error) {
        const csl = document.getElementById("console");
        removeAllChildren(csl);
        const msgNode = document.createElement("div");
        msgNode.textContent = message ? message : error ? JSON.stringify(error) : "";
        msgNode.style.color = "red";
        csl.appendChild(msgNode);
        if (error && error.stack) {
          const stackNode = document.createElement("div");
          stackNode.textContent = error.stack.replace(/\n/g, "\r\n").replace(/@/g, " at ");
          stackNode.style.whiteSpace = "pre-line";
          stackNode.style.color = "#777";
          csl.appendChild(stackNode);
        }
        csl.style.display = "block";
      }

      window.onerror = showError;

      window.updateShowGalleryBtn = function () {
        const btn = document.getElementById("showGalleryBtn");
        btn.disabled = document.getElementById("gallery").style.visibility !== "hidden";
      };

      function removeAllChildren(e) {
        while (e.firstChild) e.firstChild.remove();
      }

      function makeAsync(s) {
        const c =
          "try {\n" +
          s +
          "\n} catch (err) {showError(err.name ? err.name + ': ' + err.message : undefined, 0, 0, 0, err);}";
        return "(async () => {" + c + "})();";
      }

      function getModeMetaData(mode) {
        return mode === "static" ? staticMetaData : interactiveMetaData;
      }

      function setMode(mode, skipRefresh) {
        currentMode = mode;

        document.querySelectorAll(".modeTab").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.mode === mode);
        });

        const isInteractive = mode === "interactive";
        document.getElementById("ctrlPanel").style.display = isInteractive ? "block" : "none";
        document.getElementById("benchmarkBtn").style.display = isInteractive ? "inline-block" : "none";

        rebuildDemoList();
        rebuildGallery();

        if (!skipRefresh) refresh();
      }

      function inferModeFromHash(demoKey) {
        if (!demoKey) return currentMode;
        if (allStaticKeys.has(demoKey)) return "static";
        if (allInteractiveKeys.has(demoKey)) return "interactive";
        return currentMode;
      }

      function getModeFromQuery() {
        const mode = new URLSearchParams(window.location.search).get("mode");
        if (mode === "static" || mode === "interactive") return mode;
        return null;
      }

      function setModeInUrl(mode) {
        const url = new URL(window.location.href);
        url.searchParams.set("mode", mode);
        const query = url.searchParams.toString();
        const nextUrl = url.pathname + (query ? "?" + query : "") + url.hash;
        window.history.replaceState(null, "", nextUrl);
      }

      function rebuildDemoList() {
        const root = document.getElementById("demoList");
        root.innerHTML = "";

        const json = getModeMetaData(currentMode);
        const searchValue = (document.getElementById("demoSearch")?.value || "").trim().toLowerCase();
        let category = "";
        let list;

        for (const k of Object.keys(json)) {
          if (json[k].draft) continue;

          const group = currentMode === "static" ? json[k].mark : json[k].type;
          const demoName = (json[k].name || "").toLowerCase();
          const demoTitle = (json[k].title || "").toLowerCase();
          const demoType = (group || "").toLowerCase();
          const demoKey = k.toLowerCase();

          if (
            searchValue &&
            !(
              demoType.includes(searchValue) ||
              demoName.includes(searchValue) ||
              demoTitle.includes(searchValue) ||
              demoKey.includes(searchValue)
            )
          ) {
            continue;
          }

          if (group !== category) {
            d3.select("#demoList").append("li").attr("class", "category").text(group);
            category = group;
            list = d3.select("#demoList").append("ul").attr("class", "demos");
          }

          list
            .append("li")
            .text(json[k].name)
            .on("click", () => {
              document.getElementById("gallery").style.visibility = "hidden";
              window.updateShowGalleryBtn();
              window.location.hash = k;
            });
        }

        if (!root.children.length) {
          d3.select("#demoList")
            .append("li")
            .style("margin", "14px 0")
            .style("color", "#666")
            .text("No demos found.");
        }
      }

      function rebuildGallery() {
        const json = getModeMetaData(currentMode);
        const container = d3.select("#gallery");
        container.html("");

        let keys = Object.keys(json)
          .map((a) => ({ sort: Math.random(), value: a }))
          .sort((a, b) => a.sort - b.sort)
          .map((a) => a.value);

        for (const k of keys) {
          if (json[k].draft) continue;
          const item = container.append("div").attr("class", "galleryItem");
          const stillPath = 'demos/thumbnails/' + getDemoBaseName(k) + '.png';
          const hoverPreviewPath =
            currentMode === "interactive"
              ? stillPath.replace(/\.png$/i, ".gif")
              : null;
          item
            .append("div")
            .style("display", "block")
            .style("height", "150px")
            .style("background", "white")
            .style("background-image", 'url("' + stillPath + '")')
            .style("background-size", "auto 100%")
            .style("background-repeat", "no-repeat")
            .style("background-position", "left top")
            .on("mouseenter", function () {
              if (hoverPreviewPath) {
                d3.select(this).style("background-image", 'url("' + hoverPreviewPath + '")');
              }
            })
            .on("mouseleave", function () {
              d3.select(this).style("background-image", 'url("' + stillPath + '")');
            })
            .on("click", () => {
              document.getElementById("gallery").style.visibility = "hidden";
              window.updateShowGalleryBtn();
              window.location.hash = k;
            });

          item
            .append("div")
            .style("display", "block")
            .style("background", "#FAFAFA")
            .style("font-size", "11.5px")
            .style("font-weight", 600)
            .style("text-align", "left")
            .style("color", "#222")
            .style("height", "16px")
            .style("padding", "5px 0 0 3px")
            .text(json[k].title || json[k].name || k);
        }
      }

      function loadDataTable(responseText) {
        const csvRegex = /msc\.csv\("(.+)"\);/;
        const csvMatch = csvRegex.exec(responseText);
        if (!csvMatch) return;

        const csvPath = csvMatch[1];
        fetch(csvPath)
          .then((resp) => resp.text())
          .then((text) => {
            const rows = text.trim().split("\n");
            if (dataTable !== null) dataTable.destroy();

            const table = document.getElementById("dataTable");
            const newHead = `<thead><tr>${rows[0]
              .split(",")
              .reduce((acc, col) => (acc += `<th>${col}</th>`), "")}</tr></thead>`;
            table.innerHTML = newHead;

            dataTable = $("#dataTable").DataTable({
              data: rows.slice(1).map((row) => row.split(",")),
              searching: false,
              paging: false,
              scrollCollapse: true,
              fixedColumns: true,
              info: false,
            });
          });
      }

      function loadJson(responseText) {
        const jsonRegex = /msc\.(tree|graph)json\("(.+)"\);/;
        const jsonMatch = jsonRegex.exec(responseText);
        if (!jsonMatch) return;

        const jsonPath = jsonMatch[2];
        fetch(jsonPath)
          .then((resp) => resp.text())
          .then((text) => {
            const json = JSON.parse(text);
            jsonEditor.set({ text: undefined, json });
          });
      }

      function loadCtrls(demo) {
        fetch("demos/interactive/" + demo + "_UI.js")
          .then((response) => (response.ok ? response.text() : undefined))
          .then((data) => {
            document.getElementById("ctrlPanel").innerHTML = "";
            if (data) eval(data);
            loadDemo(demo);
          })
          .catch((error) => {
            console.error("Error fetching controls:", error);
            loadDemo(demo);
          });
      }

      function getDemoBaseName(demo) {
        if (currentMode === "interactive") return demo;
        return demo[0].toLowerCase() + demo.substring(1);
      }

      function getDemoPath(demo) {
        if (currentMode === "interactive") return "demos/interactive/" + demo + ".js";
        return "demos/static/" + getDemoBaseName(demo) + ".js";
      }

      function loadDemo(demo) {
        const oReq = new XMLHttpRequest();
        oReq.addEventListener("load", function () {
          loadScript(this.responseText);

          if (this.responseText.indexOf(".csv") > 0) {
            $("#jsonTabLi").hide();
            $("#dataTabLi").show();
            loadDataTable(this.responseText);
          } else if (
            this.responseText.indexOf(".treejson") > 0 ||
            this.responseText.indexOf(".graphjson") > 0
          ) {
            $("#jsonTabLi").show();
            $("#dataTabLi").hide();
            loadJson(this.responseText);
          }

          $("#btmPanel").tabs("option", "active", 0);

          const md = getModeMetaData(currentMode);
          if (md && md[demo]) d3.select("#infoTab").html(md[demo].about || "");
        });

        oReq.open("GET", getDemoPath(demo));
        oReq.send();
      }

      window.loadScript = function (s) {
        const script = s ? s : editor.getValue();
        const parsed = acorn.parse(script, { ecmaVersion: "latest" });
        let blocks = parsed.body.map((d) => script.substring(d.start, d.end));

        if (currentMode === "static") {
          blocks = blocks.filter((l) => l.indexOf("render") < 0);
        }

        const sceneLine = blocks.find((l) => l.indexOf("msc.scene(") > 0);
        if (!sceneLine) return;

        const sceneName = sceneLine.split("=")[0].replace("let", " ").trim();
        const r = $("input[type='radio'][name='renderer']:checked").val();
        const ele = r === "svg" ? "svgElement" : "canvasElement";

        let newScript = blocks.join("\n");
        if (currentMode === "static") {
          newScript += "\nmsc.renderer('" + r + "','" + ele + "').render(" + sceneName + ");";
        }

        const csl = document.getElementById("console");
        removeAllChildren(csl);
        csl.style.display = "none";
        document.getElementById("gallery").style.visibility = "hidden";
        window.updateShowGalleryBtn();
        document.getElementById("depGraphVis").style.visibility = "hidden";

        if (r === "svg") {
          const svg = document.getElementById("svgElement");
          removeAllChildren(svg);
          svg.style.display = "block";
          document.getElementById("canvasElement").style.display = "none";
        } else {
          const canvas = document.getElementById("canvasElement");
          canvas.style.display = "block";
          document.getElementById("svgElement").style.display = "none";
        }

        editor.setValue(newScript);
        eval(makeAsync(newScript));
      };

      window.benchmark = function () {
        if (currentMode !== "interactive") return;
        let script = editor.getValue();
        fetch("demos/interactive/" + window.location.hash.replace("#", "") + "_benchmark.js")
          .then((response) => (response.ok ? response.text() : undefined))
          .then((data) => {
            if (!data) return;
            script += data;
            const svg = document.getElementById("svgElement");
            removeAllChildren(svg);
            eval(makeAsync(script));
          })
          .catch((error) => {
            console.error("Error fetching benchmark:", error);
          });
      };

      window.save = function () {
        const code = editor.getValue();
        const demo = window.location.hash.replace("#", "");
        const scn = code.split("=")[0].replace("let", "").trim();
        let out = code;
        out += "const a = document.getElementById('download');";
        out +=
          currentMode === "interactive"
            ? "let spec = " + scn + ".toJSON();"
            : "let spec = msc.serialize(" + scn + ");";
        out +=
          "a.href = URL.createObjectURL(new Blob([JSON.stringify(spec, null, 2)], {type: 'application/json'}));";
        out +=
          "a.setAttribute('download', '" + demo + (currentMode === "interactive" ? ".alscn" : ".msc") + "');";
        out += "a.click();";
        eval(makeAsync(out));
      };

      window.showDepGraph = function () {
        let code = editor.getValue();
        const scn = code.split("=")[0].replace("let", "").trim();
        code += "return " + scn + "._depGraph;";
        const dg = eval(makeAsync(code));
        dg.then((r) => {
          visualizeDepGraph(r);
        });
      };

      function refresh() {
        document.getElementById("depGraphVis").style.visibility = "hidden";
        const demo = window.location.hash.replace("#", "");

        const modeFromQuery = getModeFromQuery();
        if (modeFromQuery && modeFromQuery !== currentMode) {
          setMode(modeFromQuery, true);
        }


        if (!demo) {
          document.getElementById("gallery").style.visibility = "visible";
          window.updateShowGalleryBtn();
          return;
        }

        if (!modeFromQuery) {
          const inferredMode = inferModeFromHash(demo);
          if (inferredMode !== currentMode) {
            setMode(inferredMode, true);
          }
        }

        const md = getModeMetaData(currentMode);

        if (!md[demo]) {
          document.getElementById("gallery").style.visibility = "visible";
          window.updateShowGalleryBtn();
          return;
        }

        document.getElementById("gallery").style.visibility = "hidden";
        window.updateShowGalleryBtn();
        if (currentMode === "interactive") {
          loadCtrls(demo);
        } else {
          loadDemo(demo);
        }
      }

      window.onhashchange = refresh;

      $("input[type=radio][name=renderer]").change(function () {
        window.loadScript();
      });

      $(function () {
        $("#btmPanel").resizable({ minHeight: 100, handles: "n" });
        $("#btmPanel").tabs({
          activate: function (event, ui) {
            const t = ui.newTab.attr("li", "innerHTML")[0].getElementsByTagName("a")[0].innerHTML;
            if (t === "Code") $("#codeControls").css("visibility", "visible");
            else $("#codeControls").css("visibility", "hidden");
          },
        });

        jsonEditor = new JSONEditor({
          target: document.getElementById("jsonTab"),
          props: {
            content: { text: undefined, json: {} },
            readOnly: true,
            onChange: (updatedContent, previousContent, patchResult) => {
              console.log("onChange", updatedContent, previousContent, patchResult);
            },
          },
        });
      });

      document.querySelectorAll(".modeTab").forEach((btn) => {
        btn.addEventListener("click", () => {
          setMode(btn.dataset.mode, true);
          setModeInUrl(btn.dataset.mode);
          window.location.hash = "";
        });
      });

      document.getElementById("demoSearch").addEventListener("input", () => {
        rebuildDemoList();
      });

      $(document).ready(() => {
        Promise.all([
          fetch("demos/static.json").then((r) => r.text()),
          fetch("demos/interactive.json").then((r) => r.text()),
        ]).then(([sText, iText]) => {
          staticMetaData = JSON.parse(sText);
          interactiveMetaData = JSON.parse(iText);
          allStaticKeys = new Set(Object.keys(staticMetaData));
          allInteractiveKeys = new Set(Object.keys(interactiveMetaData));

          const modeFromQuery = getModeFromQuery();
          setMode(modeFromQuery || "static", true);
          refresh();
          window.updateShowGalleryBtn();
        });
      });
    </script>
  </body>
</html>
